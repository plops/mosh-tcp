name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package assets
        shell: bash
        run: |
          set -euo pipefail
          echo "Packaging mosh-tcp-${{ matrix.target }}..."
          mkdir -p staging

          # Copy binary
          bin_path="target/${{ matrix.target }}/release/mosh-tcp"
          if [ ! -f "$bin_path" ]; then
            bin_path="target/release/mosh-tcp"
          fi

          if [ -f "$bin_path" ]; then
            cp "$bin_path" staging/
          else
            echo "Error: mosh-tcp binary not found!"
            exit 1
          fi

          # Copy documentation if present
          if [ -f README.md ]; then
            cp README.md staging/
          fi
          if [ -f walkthrough.md ]; then
            cp walkthrough.md staging/
          fi

          # Archive asset
          tar_name="mosh-tcp-linux-amd64.tar.gz"
          tar czf "$tar_name" -C staging .
          rm -rf staging
          echo "Created archive: $tar_name"
          ls -la "$tar_name"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            mosh-tcp-linux-amd64.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
