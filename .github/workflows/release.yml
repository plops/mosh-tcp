name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install UPX & xz
        run: |
          sudo apt-get update
          sudo apt-get install -y upx xz-utils

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build standalone client release
        run: cargo build --release --no-default-features --features client --bin mosh-tcp-client --target ${{ matrix.target }}

      - name: Build standalone server release
        run: cargo build --release --no-default-features --features server --bin mosh-tcp-server --target ${{ matrix.target }}

      - name: Build unified release
        run: cargo build --release --bin mosh-tcp --target ${{ matrix.target }}

      - name: Package assets
        shell: bash
        run: |
          set -euo pipefail
          echo "Packaging mosh-tcp release assets for ${{ matrix.target }}..."
          
          target_dir="target/${{ matrix.target }}/release"
          if [ ! -d "$target_dir" ]; then
            target_dir="target/release"
          fi

          # 1. UPX Compress all binaries
          echo "Compressing binaries with UPX (--best --lzma)..."
          upx --best --lzma "$target_dir/mosh-tcp-client" "$target_dir/mosh-tcp-server" "$target_dir/mosh-tcp"

          # 2. Standalone Client Executable (direct download for slow connections, ~258 KB)
          cp "$target_dir/mosh-tcp-client" mosh-tcp-client-linux-amd64
          chmod +x mosh-tcp-client-linux-amd64

          # 3. Client Tar.xz Archive
          mkdir -p client_staging
          cp "$target_dir/mosh-tcp-client" client_staging/
          if [ -f README.md ]; then cp README.md client_staging/; fi
          tar -cf - -C client_staging . | xz -9e > mosh-tcp-client-linux-amd64.tar.xz
          rm -rf client_staging

          # 4. Server Tar.gz Archive
          mkdir -p server_staging
          cp "$target_dir/mosh-tcp-server" server_staging/
          if [ -f README.md ]; then cp README.md server_staging/; fi
          tar czf mosh-tcp-server-linux-amd64.tar.gz -C server_staging .
          rm -rf server_staging

          # 5. Unified Package Tar.gz Archive
          mkdir -p unified_staging
          cp "$target_dir/mosh-tcp" unified_staging/
          if [ -f README.md ]; then cp README.md unified_staging/; fi
          tar czf mosh-tcp-linux-amd64.tar.gz -C unified_staging .
          rm -rf unified_staging

          echo "=== RELEASE ARTIFACTS GENERATED ==="
          ls -lh mosh-tcp-client-linux-amd64 mosh-tcp-client-linux-amd64.tar.xz mosh-tcp-server-linux-amd64.tar.gz mosh-tcp-linux-amd64.tar.gz

      - name: Extract Tag Release Body
        shell: bash
        run: |
          echo "Extracting release notes from tag annotation..."
          git tag -l --format='%(contents)' "${{ github.ref_name }}" > release_body.md
          if [ ! -s release_body.md ]; then
            git log -1 --format='%s%n%n%b' > release_body.md
          fi
          echo "=== RELEASE BODY TO BE PUBLISHED ON GITHUB WEBSITE ==="
          cat release_body.md
          echo "======================================================"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            mosh-tcp-client-linux-amd64
            mosh-tcp-client-linux-amd64.tar.xz
            mosh-tcp-server-linux-amd64.tar.gz
            mosh-tcp-linux-amd64.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
