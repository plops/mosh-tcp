name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install UPX, build-essential & xz
        run: |
          sudo apt-get update
          sudo apt-get install -y upx xz-utils build-essential

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build standalone Rust client release
        run: cargo build --release --no-default-features --features client --bin mosh-tcp-client --target ${{ matrix.target }}

      - name: Build standalone Rust server release
        run: cargo build --release --no-default-features --features server --bin mosh-tcp-server --target ${{ matrix.target }}

      - name: Build standalone C client release
        run: make -C clients/c clean all

      - name: Build standalone C++ client release
        run: make -C clients/cpp clean all

      - name: Package assets
        shell: bash
        run: |
          set -euo pipefail
          echo "Packaging mosh-tcp release assets for ${{ matrix.target }}..."
          
          target_dir="target/${{ matrix.target }}/release"
          if [ ! -d "$target_dir" ]; then
            target_dir="target/release"
          fi

          # 1. UPX Compress all client and server binaries
          echo "Compressing Rust, C, and C++ binaries with UPX (--best --lzma)..."
          upx --best --lzma "$target_dir/mosh-tcp-client" "$target_dir/mosh-tcp-server" clients/c/mosh-tcp-client-c clients/cpp/mosh-tcp-client-cpp

          # 2. Standalone UPX Executables
          cp "$target_dir/mosh-tcp-client" mosh-tcp-client-linux-amd64
          cp clients/c/mosh-tcp-client-c mosh-tcp-client-c-linux-amd64
          cp clients/cpp/mosh-tcp-client-cpp mosh-tcp-client-cpp-linux-amd64
          chmod +x mosh-tcp-client-linux-amd64 mosh-tcp-client-c-linux-amd64 mosh-tcp-client-cpp-linux-amd64

          # 3. Archive containing all Clients and Server
          mkdir -p archive_staging
          cp "$target_dir/mosh-tcp-client" "$target_dir/mosh-tcp-server" archive_staging/
          cp clients/c/mosh-tcp-client-c archive_staging/
          cp clients/cpp/mosh-tcp-client-cpp archive_staging/
          if [ -f README.md ]; then cp README.md archive_staging/; fi
          tar czf mosh-tcp-linux-amd64.tar.gz -C archive_staging .
          rm -rf archive_staging

          echo "=== RELEASE ARTIFACTS GENERATED ==="
          ls -lh mosh-tcp-client-linux-amd64 mosh-tcp-client-c-linux-amd64 mosh-tcp-client-cpp-linux-amd64 mosh-tcp-linux-amd64.tar.gz

      - name: Extract Tag Release Body
        shell: bash
        run: |
          echo "Extracting release notes from tag annotation..."
          git tag -l --format='%(contents)' "${{ github.ref_name }}" > release_body.md
          if [ ! -s release_body.md ]; then
            git log -1 --format='%s%n%n%b' > release_body.md
          fi
          echo "=== RELEASE BODY TO BE PUBLISHED ON GITHUB WEBSITE ==="
          cat release_body.md
          echo "======================================================"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            mosh-tcp-client-linux-amd64
            mosh-tcp-client-c-linux-amd64
            mosh-tcp-client-cpp-linux-amd64
            mosh-tcp-linux-amd64.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
